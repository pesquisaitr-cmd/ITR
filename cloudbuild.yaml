steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/dashboard-itr', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/dashboard-itr']

- name: 'google/cloud-sdk:latest'
  args:
    - 'run'
    - 'deploy'
    - 'dashboard-itr'
    - '--image'
    - 'gcr.io/$PROJECT_ID/dashboard-itr'
    - '--region'
    - 'southamerica-east1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
